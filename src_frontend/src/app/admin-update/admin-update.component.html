<div class="header">
    <h1>Admin</h1>
    <a (click)="logout()" class="logout-link">Logout</a>
</div>

<div class="registration-container">
    <h2>Azuriranje</h2>

    <div *ngIf="currentStep === 1">

        <label>Gmail:</label>
        <input type="text" [(ngModel)]="korisnik.gmail">

        <br>
        <button (click)="nextStep()">Sledeca</button>
    </div>

    <div *ngIf="currentStep === 2">

        <label>Ime:</label>
        <input type="text" [(ngModel)]="korisnik.ime">
        <br>

        <label>Prezime:</label>
        <input type="text" [(ngModel)]="korisnik.prezime">
        <br>

        <button (click)="prevStep()" style="background-color: rgb(219, 192, 115)">Prethodna</button>
        &nbsp;
        <button (click)="nextStep()">Sledeca</button>

    </div>

    <div *ngIf="currentStep === 3">

        <div class="pol">
            <span>Pol:</span>
            <label>Muški</label>
            <input type="radio" name="r1" [(ngModel)]="korisnik.pol" value="M">
            <label>Ženski</label>
            <input type="radio" name="r1" [(ngModel)]="korisnik.pol" value="Z">
        </div>

        <br>
        <label>Adresa:</label>
        <input type="text" [(ngModel)]="korisnik.adresa">

        <br>
        <label>Kontakt telefon:</label>
        <input type="text" [(ngModel)]="korisnik.kontaktTelefon">

        <br>
        <label>Broj kartice:</label>
        <input type="text" [(ngModel)]="korisnik.brojKartice">
        <span class="crveno">{{porukaBrKartice}}</span>
        <br>

        <div *ngIf="korisnik.tip == 'D'">
        <br>
        <label for="firmaSelect">Naziv firme:</label>
        <select id="firmaSelect" [(ngModel)]="korisnik.firma">
            <option *ngFor="let naziv of naziviFirmi" [value]="naziv">{{ naziv }}</option>
        </select>
        <br>
        </div>

        <button (click)="prevStep()" style="background-color: rgb(219, 192, 115)">Prethodna</button>
        &nbsp;
        <button (click)="nextStepBrKart()">Sledeca</button>
    </div>

    <div *ngIf="currentStep === totalSteps">

        <label>Profilna slika:</label>
        <input type="file" id="slika" name="slika" (change)="onFileSelected($event)">
        <br>
        <span class="crveno">{{porukaProfilnaSlika}}</span>
        <br>

        <div class="tip">
            <span>Tip:</span>
            <label>Vlasnik</label>
            <input type="radio" name="r2" [(ngModel)]="korisnik.tip" value="V">
            <label>Dekorater</label>
            <input type="radio" name="r2" [(ngModel)]="korisnik.tip" value="D">
        </div>

        <div class="recaptcha-container" style="display: flex; align-items: center;">
            <re-captcha [siteKey]="siteKey" (resolved)="resolved($event)">
            </re-captcha>

            <img *ngIf="ikonaKartice" [src]="ikonaKartice" alt="Tip kartice"
                style="width: 80px; height: 60px; margin-left: 15px;">
        </div>
        <span class="crveno">{{recaptchaError}}</span>
        <br>

        <br>
        <span class="crveno">{{porukaGmail}}</span>
        <br>

        <button (click)="prevStep()" style="background-color: rgb(219, 192, 115)">Prethodna</button>
        &nbsp;
        <button (click)="azuriraj()">Potvrdi</button>
    </div>

</div>

<div class="footer">
    <p>© 2024 Djordje Djordjic. Sva prava zadržana.</p>
</div>
